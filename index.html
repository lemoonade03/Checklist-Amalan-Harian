  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080C14; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(220,170,40,0.25); border-radius: 4px; }
    button { font-family: 'Georgia', serif; cursor: pointer; }
    p { margin: 0; }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    #install-banner {
      display: none;
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(220,170,40,0.15); border: 1px solid rgba(220,170,40,0.4);
      color: #F5D060; font-family: Georgia, serif; font-size: 13px;
      padding: 10px 20px; border-radius: 30px; cursor: pointer;
      z-index: 9999; backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #install-banner:hover { background: rgba(220,170,40,0.25); }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(62,168,106,0.2); border: 1px solid rgba(62,168,106,0.5);
      color: #7FE0A0; font-family: Georgia, serif; font-size: 12px;
      padding: 8px 18px; border-radius: 20px; z-index: 9999;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }
    @keyframes toastIn { from { opacity: 0; top: 10px; } to { opacity: 1; top: 20px; } }
    @keyframes toastOut { to { opacity: 0; top: 10px; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <button id="install-banner">⬇️ Pasang di Home Screen</button>

  <script>
    // ── Service Worker ──────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── Install Prompt ──────────────────────────────────────────
    let deferredPrompt;
    const installBtn = document.getElementById('install-banner');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

    // ── Auto-reset checklist setiap hari ───────────────────────
    const todayKey = new Date().toISOString().split('T')[0];
    const savedDay = localStorage.getItem('amalan_day');
    if (savedDay !== todayKey) {
      localStorage.removeItem('amalan_checked');
      localStorage.setItem('amalan_day', todayKey);
    }
  </script>

              { id: 10, icon: "🌅", nama: "Shalat Dhuha (Min. 2 Rakaat)", waktu: "±07:00 – 11:00", tag: "Muakkad", detail: "Minimal 2 rakaat, maksimal 8 rakaat. Waktunya sejak ±35 menit setelah matahari terbit sampai menjelang Zuhur. Setelah salam baca Doa Dhuha.", latin: "Niat:\nUshalli sunnatadh-dhuhaa rak'ataini lillaahi ta'aalaa.\n\nDoa Dhuha:\nAllaahumma innadh-dhuhaa-a dhuhaa-uka, wal-bahaa-a bahaa-uka, wal-jamaala jamaaluka, wal-quwwata quwwatuka, wal-qudrota qudrotika, wal-'ishmata 'ishmatuka.\nAllaahumma in kaana rizqii fissamaa-i fa-anzilhu, wa in kaana fil-ardhi fa-akhrijhu, wa in kaana mu'siran fa-yassirhu, wa in kaana haraaman fa-thahhirhu, wa in kaana ba'iidan fa-qarribhu, bihaqqi dhuhaa-ika wa bahaa-ika wa jamaalika wa quwwatika wa qudrotika, aatinii maa atayta 'ibaadakash-shaalihiin.", fadilah: "Allah berfirman: 'Wahai anak Adam, shalatlah 4 rakaat di awal siang, niscaya Aku cukupkan kebutuhanmu hingga sore.' (HR. Tirmidzi)" },
              { id: 11, icon: "🌙", nama: "Shalat Tahajud (Min. 2 Rakaat)", waktu: "02:00 – 04:00 (Sepertiga malam terakhir)", tag: "Muakkad", detail: "Tidur dulu lalu bangun di sepertiga malam terakhir. Minimal 2 rakaat hingga 8 rakaat. Setelah salam, luangkan waktu berdoa dengan sungguh-sungguh — ini waktu paling mustajab.", latin: "Niat:\nUshalli sunnatan-tahajjudi rak'ataini lillaahi ta'aalaa.\n\nDoa setelah Tahajud:\nAllaahumma lakal-hamdu anta qayyimus-samaawaati wal-ardhi wa man fiihin...\n(lanjutkan dengan doa rezeki dan hajatmu sendiri dengan bahasa apapun)", fadilah: "Allah turun ke langit dunia setiap sepertiga malam terakhir: 'Siapa yang berdoa, Aku kabulkan. Siapa yang meminta, Aku beri. Siapa yang minta ampun, Aku ampuni.' (HR. Bukhari)" },

              { id: 35, icon: "💸", nama: "Doa Rezeki & Lunasi Hutang", waktu: "Setelah Tahajud atau Ba'da Subuh", detail: "Dua doa khusus masalah finansial. Doa pertama: berlindung dari kecemasan & hutang. Doa kedua: minta kecukupan dari yang halal.", latin: "Doa 1 (dari kecemasan & hutang):\nAllaahumma innii a'uudzu bika minal-hammi wal-huzni, wal-'ajzi wal-kasali, wal-bukhli wal-jubni, wa dhala'id-daini wa ghalabatir-rijaal.\n\nDoa 2 (rezeki halal):\nAllaahumma akfinii bihalaálika 'an haraamika wa aghnini bifadhlika 'amman siwaak.\n\nArtinya: 'Ya Allah, cukupkanlah aku dengan yang halal dari yang haram, dan kayakanlah aku dengan karunia-Mu dari selain-Mu.'", fadilah: "Doa kedua diriwayatkan: siapa membacanya, Allah lunaskan utangnya walau sebesar gunung Uhud. (HR. Tirmidzi)" },
              { id: 36, icon: "🌙", nama: "Taubat Nasuha (Doa Khusus)", waktu: "Setelah Tahajud — waktu paling khusyu", detail: "Syarat taubat nasuha: (1) Menyesal sungguh-sungguh, (2) Berhenti dari dosa, (3) Bertekad tidak mengulangi. Lakukan dalam kesendirian, menangislah jika bisa.", latin: "Allaahumma innii zhalamtu nafsii zhulman katsiiran wa laa yaghfirudz-dzunuuba illaa anta, faghfirlii maghfiratan min 'indika warham-nii, innaka antal-ghafuurur-rahiim.\n\nArtinya: 'Ya Allah, aku telah banyak menzalimi diriku sendiri, dan tidak ada yang mengampuni dosa-dosa kecuali Engkau. Ampunilah aku dan rahmatilah aku. Sesungguhnya Engkau Maha Pengampun lagi Maha Penyayang.'", fadilah: "Allah sangat gembira dengan taubat hamba-Nya, melebihi kegembiraan seseorang yang menemukan kembali untanya yang hilang di padang pasir. (HR. Bukhari Muslim)" },

    const KATEGORI_ORDER = ["wajib", "sunnah", "dianjurkan"];

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2100);
    }

    // ─────────────────────────── APP ────────────────────────────
    function App() {
      const allItems = KATEGORI_ORDER.flatMap(k => DATA[k].subGroups.flatMap(sg => sg.items));
      const totalAll = allItems.length;

      const [checked, setChecked] = useState(() => {
        try { return JSON.parse(localStorage.getItem('amalan_checked') || '{}'); } catch { return {}; }
      });
      const [expanded, setExpanded] = useState({});
      const [activeTab, setActiveTab] = useState("semua");
      const [expandedSub, setExpandedSub] = useState({});

      useEffect(() => {
        localStorage.setItem('amalan_checked', JSON.stringify(checked));
      }, [checked]);

      const done = Object.values(checked).filter(Boolean).length;
      const persen = Math.round((done / totalAll) * 100);

      const toggle = useCallback((id, nama) => {
        setChecked(p => {
          const next = { ...p, [id]: !p[id] };
          if (next[id]) showToast('✓ ' + nama);
          return next;
        });
      }, []);
      const toggleExpand = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));
      const toggleSub = (key) => setExpandedSub(p => ({ ...p, [key]: p[key] === false ? true : false }));

      const resetAll = () => {
        if (window.confirm('Reset semua checklist hari ini?')) {
          setChecked({});
          localStorage.removeItem('amalan_checked');
        }
      };

      const getMotivasi = () => {
        if (persen === 0) return "Bismillah, mulai perjalananmu hari ini 🌱";
        if (persen < 25) return "MasyaAllah, langkah pertama adalah yang terberat 💪";
        if (persen < 50) return "Subhanallah, terus istiqomah! Allah melihatmu 🌟";
        if (persen < 75) return "Alhamdulillah, setengah perjalanan sudah! 🔥";
        if (persen < 100) return "MasyaAllah, hampir sempurna! Luar biasa ✨";
        return "MasyaAllah Tabarakallah! Hari yang penuh berkah 🌙";
      };

      const counts = {
        semua: totalAll,
        wajib: DATA.wajib.subGroups.flatMap(s => s.items).length,
        sunnah: DATA.sunnah.subGroups.flatMap(s => s.items).length,
        dianjurkan: DATA.dianjurkan.subGroups.flatMap(s => s.items).length,
      };

      const renderItems = activeTab === "semua"
        ? KATEGORI_ORDER.map(k => ({ key: k, ...DATA[k] }))
        : [{ key: activeTab, ...DATA[activeTab] }];

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(160deg, #080C14 0%, #0A1208 45%, #14080A 100%)",
          fontFamily: "'Georgia', serif", color: "#E0CCA0", paddingBottom: 80
        }}>
          {/* HEADER */}
          <div style={{ padding: "32px 20px 0", textAlign: "center" }}>
            <div style={{ fontSize: 12, color: "#B8900A", letterSpacing: 8, marginBottom: 8 }}>✦ ✦ ✦</div>
            <h1 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: "bold", color: "#F5D060", letterSpacing: 1, textShadow: "0 0 40px rgba(220,170,40,0.35)" }}>
              40 Amalan Harian
            </h1>
            <p style={{ fontSize: 13, color: "#907050", margin: "0 0 18px" }}>Wajib · Sunnah · Dianjurkan</p>

            {/* PROGRESS */}
            <div style={{ background: "rgba(220,170,40,0.07)", border: "1px solid rgba(220,170,40,0.18)", borderRadius: 14, padding: "14px 18px", maxWidth: 420, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, alignItems: "center" }}>
                <span style={{ fontSize: 12, color: "#907050" }}>Progress Hari Ini</span>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 18, fontWeight: "bold", color: "#F5D060" }}>
                    {done}<span style={{ fontSize: 12, color: "#907050" }}>/{totalAll}</span>
                  </span>
                  <button onClick={resetAll} style={{ fontSize: 10, color: "#504030", background: "transparent", border: "1px solid #302010", borderRadius: 8, padding: "2px 7px" }}>Reset</button>
                </div>
              </div>
              <div style={{ height: 7, background: "rgba(255,255,255,0.08)", borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                <div style={{ height: "100%", width: `${persen}%`, background: "linear-gradient(90deg, #B87820, #F5D060)", borderRadius: 4, transition: "width 0.5s ease", boxShadow: "0 0 10px rgba(220,170,40,0.4)" }} />
              </div>
              <p style={{ fontSize: 11, color: "#C0A050", margin: 0, fontStyle: "italic" }}>{getMotivasi()}</p>
            </div>

            {/* LEGEND */}
            <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 14, marginBottom: 4, flexWrap: "wrap" }}>
              {[["#E05A2B", "Wajib (5)"], ["#3EA86A", "Sunnah (15)"], ["#6A7FCA", "Dianjurkan (20)"]].map(([color, lbl]) => (
                <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: color }} />
                  <span style={{ fontSize: 11, color: "#807060" }}>{lbl}</span>
                </div>
              ))}
            </div>
          </div>

          {/* TABS */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "14px 16px 6px", scrollbarWidth: "none" }}>
            {[["semua","Semua"],["wajib","🔴 Wajib"],["sunnah","🟢 Sunnah"],["dianjurkan","🔵 Dianjurkan"]].map(([k, lbl]) => (
              <button key={k} onClick={() => setActiveTab(k)} style={{
                flexShrink: 0, padding: "7px 14px", borderRadius: 20,
                border: activeTab === k ? "1px solid rgba(220,170,40,0.6)" : "1px solid rgba(220,170,40,0.15)",
                background: activeTab === k ? "rgba(220,170,40,0.15)" : "transparent",
                color: activeTab === k ? "#F5D060" : "#706050",
                fontSize: 12, transition: "all 0.2s"
              }}>
                {lbl} <span style={{ opacity: 0.5, fontSize: 10 }}>({counts[k]})</span>
              </button>
            ))}
          </div>

          {/* CONTENT */}
          <div style={{ padding: "8px 14px 0" }}>
            {renderItems.map(({ key, label, subtitle, accent, icon, subGroups }) => (
              <div key={key} style={{ marginBottom: 24 }} className="fade-in">
                {activeTab === "semua" && (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, paddingBottom: 10, borderBottom: `1px solid ${accent}33` }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: `${accent}22`, border: `1px solid ${accent}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{icon}</div>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: "bold", color: accent }}>{label}</div>
                      <div style={{ fontSize: 10, color: "#706050" }}>{subtitle}</div>
                    </div>
                    <div style={{ marginLeft: "auto", background: `${accent}22`, color: accent, border: `1px solid ${accent}33`, borderRadius: 12, padding: "2px 10px", fontSize: 11 }}>
                      {subGroups.flatMap(s => s.items).filter(i => checked[i.id]).length}/{subGroups.flatMap(s => s.items).length}
                    </div>
                  </div>
                )}

                {subGroups.map((sg) => {
                  const subKey = `${key}-${sg.nama}`;
                  const isSubOpen = expandedSub[subKey] !== false;
                  return (
                    <div key={sg.nama} style={{ marginBottom: 12 }}>
                      <div onClick={() => toggleSub(subKey)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: `${accent}0D`, border: `1px solid ${accent}22`, borderRadius: 10, cursor: "pointer", marginBottom: isSubOpen ? 8 : 0 }}>
                        <span style={{ fontSize: 14 }}>{sg.icon}</span>
                        <span style={{ flex: 1, fontSize: 13, color: "#C0A070", fontWeight: "bold" }}>{sg.nama}</span>
                        <span style={{ fontSize: 11, color: accent, opacity: 0.7 }}>
                          {sg.items.filter(i => checked[i.id]).length}/{sg.items.length}
                        </span>
                        <span style={{ color: accent, fontSize: 14, opacity: 0.6, transition: "transform 0.3s", transform: isSubOpen ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
                      </div>

                      {isSubOpen && (
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {sg.items.map((a) => {
                            const isChecked = !!checked[a.id];
                            const isExp = !!expanded[a.id];
                            return (
                              <div key={a.id} style={{ background: isChecked ? "rgba(220,170,40,0.04)" : `${DATA[key].bg}DD`, border: isChecked ? "1px solid rgba(220,170,40,0.3)" : `1px solid ${accent}28`, borderRadius: 12, overflow: "hidden", transition: "all 0.25s", opacity: isChecked ? 0.6 : 1 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", cursor: "pointer" }} onClick={() => toggleExpand(a.id)}>
                                  <div onClick={(e) => { e.stopPropagation(); toggle(a.id, a.nama); }} style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, border: isChecked ? `2px solid ${accent}` : `2px solid ${accent}44`, background: isChecked ? accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all 0.2s" }}>
                                    {isChecked && <span style={{ color: "#fff", fontSize: 12, fontWeight: "bold" }}>✓</span>}
                                  </div>
                                  <span style={{ fontSize: 18, flexShrink: 0 }}>{a.icon}</span>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    {a.tag && (
                                      <span style={{ fontSize: 10, background: `${accent}22`, color: accent, border: `1px solid ${accent}33`, padding: "1px 7px", borderRadius: 8, display: "inline-block", marginBottom: 3 }}>{a.tag}</span>
                                    )}
                                    <p style={{ margin: 0, fontSize: 13, fontWeight: "bold", color: isChecked ? "#706050" : "#E8D090", textDecoration: isChecked ? "line-through" : "none", lineHeight: 1.3 }}>{a.nama}</p>
                                    <p style={{ margin: "2px 0 0", fontSize: 11, color: "#605040" }}>{a.waktu}</p>
                                  </div>
                                  <span style={{ color: accent, fontSize: 15, flexShrink: 0, transition: "transform 0.3s", transform: isExp ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
                                </div>

                                {isExp && (
                                  <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${accent}18` }}>
                                    <p style={{ fontSize: 11, color: accent, margin: "12px 0 5px", fontWeight: "bold", letterSpacing: 1, textTransform: "uppercase" }}>📋 Cara Melakukan</p>
                                    <p style={{ fontSize: 13, color: "#C0A880", margin: 0, lineHeight: 1.7 }}>{a.detail}</p>
                                    {a.latin && (
                                      <div style={{ marginTop: 10, background: `${accent}0C`, border: `1px solid ${accent}20`, borderRadius: 10, padding: "10px 12px" }}>
                                        <p style={{ fontSize: 11, color: accent, margin: "0 0 5px", fontWeight: "bold", textTransform: "uppercase", letterSpacing: 1 }}>🗣️ Bacaan / Niat</p>
                                        <p style={{ fontSize: 12, color: "#E8D080", margin: 0, lineHeight: 2, fontStyle: "italic", whiteSpace: "pre-line" }}>{a.latin}</p>
                                      </div>
                                    )}
                                    {a.fadilah && (
                                      <div style={{ marginTop: 10, borderLeft: `3px solid ${accent}66`, padding: "7px 10px", borderRadius: "0 8px 8px 0", background: "rgba(200,150,30,0.05)" }}>
                                        <p style={{ fontSize: 11, color: accent, margin: "0 0 3px", fontWeight: "bold", textTransform: "uppercase", letterSpacing: 1 }}>💫 Keutamaan</p>
                                        <p style={{ fontSize: 12, color: "#909070", margin: 0, lineHeight: 1.6, fontStyle: "italic" }}>{a.fadilah}</p>
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* FOOTER */}
          <div style={{ textAlign: "center", padding: "20px 20px 0", color: "#504030", fontSize: 12 }}>
            <div style={{ color: "#B8900A", fontSize: 18, marginBottom: 8 }}>✦ ✦ ✦</div>
            <p style={{ margin: "0 0 4px", color: "#C8A050", fontStyle: "italic" }}>
              "Sesungguhnya bersama kesulitan ada kemudahan." — QS. Al-Insyirah: 6
            </p>
            <p style={{ margin: 0, color: "#504030", fontSize: 11 }}>Reset otomatis setiap hari baru 🌙</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
